<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#0052cc"/>
      <stop offset="100%" stop-color="#00bfa6"/>
    </linearGradient>
    <filter id="f" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="320" fill="url(#g)" rx="8"/>
  <g filter="url(#f)">
    <g transform="translate(64,48)">
      <text x="0" y="0" font-family="Segoe UI, Roboto, Arial" font-size="40" fill="#fff" font-weight="700">FMCG PROJECT</text>
      <text x="0" y="48" font-family="Segoe UI, Roboto, Arial" font-size="20" fill="#e6fff8">Pipeline • KPI engine • Analytics-ready outputs</text>
      <rect x="0" y="78" width="520" height="2" fill="#ffffff" opacity="0.12" rx="1"/>
      <g transform="translate(0,100)">
        <text x="0" y="0" font-family="Segoe UI, Roboto, Arial" font-size="14" fill="#f0fff8">Bronze → Silver → Gold</text>
        <g transform="translate(0,28)">
          <circle cx="12" cy="10" r="10" fill="#fff" opacity="0.12"/>
          <text x="28" y="14" font-size="13" fill="#fff">Ingest raw sources (CSV / DB / APIs)</text>
        </g>
        <g transform="translate(0,56)">
          <circle cx="12" cy="10" r="10" fill="#fff" opacity="0.12"/>
          <text x="28" y="14" font-size="13" fill="#fff">Transform and enrich</text>
        </g>
        <g transform="translate(0,84)">
          <circle cx="12" cy="10" r="10" fill="#fff" opacity="0.12"/>
          <text x="28" y="14" font-size="13" fill="#fff">KPI outputs & dashboards</text>
        </g>
      </g>
    </g>
  </g>
</svg>
